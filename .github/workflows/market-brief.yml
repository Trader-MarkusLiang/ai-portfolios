name: X Market Brief

on:
  schedule:
    # Beijing 07:00 -> UTC 23:00 (previous day)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      force_lookback_days:
        description: 'Force re-read the last N days without using last_seen (0 = normal incremental run)'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  market-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build report
        id: build
        env:
          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ARK_BASE_URL: ${{ secrets.ARK_BASE_URL || 'https://ark.cn-beijing.volces.com/api/coding/v3' }}
          ARK_MODEL: ${{ secrets.ARK_MODEL || 'kimi-k2.6' }}
          FORCE_LOOKBACK_DAYS: ${{ github.event.inputs.force_lookback_days || '0' }}
        run: |
          python -m src.main

      - name: Render PDF
        id: pdf
        if: ${{ steps.build.outputs.report_path != '' }}
        continue-on-error: true
        run: |
          pdf_path="${{ steps.build.outputs.report_path }}"
          pdf_path="${pdf_path%.md}.pdf"
          python scripts/render_report_pdf.py "${{ steps.build.outputs.report_path }}" --output "$pdf_path"
          echo "pdf_path=$pdf_path" >> "$GITHUB_OUTPUT"

      - name: Send to Discord
        if: ${{ steps.build.outputs.report_path != '' && steps.build.outputs.discord_title != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "${{ steps.pdf.outputs.pdf_path }}" ] && [ -f "${{ steps.pdf.outputs.pdf_path }}" ]; then
            python scripts/send_discord.py "${{ steps.pdf.outputs.pdf_path }}" \
              --title "${{ steps.build.outputs.discord_title }}"
          else
            python scripts/send_discord.py "${{ steps.build.outputs.report_path }}" \
              --title "${{ steps.build.outputs.discord_title }} · pdf-failed"
          fi

      - name: Persist last_seen.json
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ github.event.inputs.force_lookback_days || '0' }}" != "0" ]; then
            echo "force_lookback_days is set; persist summaries only."
            git add reports/summaries/
          elif [ -f data/last_seen.json ]; then
            git add data/last_seen.json reports/summaries/
          else
            echo "no last_seen.json to persist."
          fi
          if ! git diff --cached --quiet; then
            git commit -m "chore(state): update last_seen and summaries [skip ci]"
            git push
          else
            echo "state and summaries unchanged, skip commit."
          fi

      - name: Upload report artifact
        uses: actions/upload-artifact@v5
        with:
          name: market-brief-report
          path: |
            reports/
            data/raw_*.json
          if-no-files-found: ignore
