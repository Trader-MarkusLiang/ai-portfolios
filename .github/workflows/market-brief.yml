name: X Market Brief

on:
  schedule:
    # Beijing 07:00 -> UTC 23:00 (previous day)
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  market-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # we push back last_seen.json; need a real token, not GITHUB_TOKEN restricted to no-push
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build report
        id: build
        env:
          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
        run: |
          python -m src.main

      - name: Send to Discord
        if: ${{ steps.build.outputs.report_path != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python scripts/send_discord.py "${{ steps.build.outputs.report_path }}" \
            --title "Market Brief 日报"

      - name: Persist last_seen.json
        if: always()
        run: |
          if [ -f data/last_seen.json ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/last_seen.json
            if ! git diff --cached --quiet; then
              git commit -m "chore(state): update last_seen.json [skip ci]"
              git push
            else
              echo "last_seen.json unchanged, skip commit."
            fi
          else
            echo "no last_seen.json to persist."
          fi

      - name: Upload report artifact
        uses: actions/upload-artifact@v5
        with:
          name: market-brief-report
          path: |
            reports/
            data/raw_*.json
          if-no-files-found: ignore
